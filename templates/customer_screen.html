<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Screen</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='customerstyle.css') }}">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <div class="customer-screen-container">
        <div class="preparing-column">
            <h4>Preparing..</h4>
            <div id="preparing-list">
                {% for item in not_ready_sales %}
                    <div class="display-card">
                        <h5>{{ item[1] }}</h5>
                    </div>
                {% endfor %}
            </div>
        </div>
        <div class="please-collect-column">
            <h4>Please Collect..</h4>
            <div id="ready-list">
                {% for item in ready_sales %}
                    <div class="display-card">
                        <h5>{{ item[1] }}</h5>
                    </div>
                {% endfor %}
            </div>
        </div>
        <div class="image-column">
            <img class="display-image" src="{{ url_for('static', filename='images/placeholder.png') }}">
        </div>
    </div>

    <script>
        const socket = io();

        socket.on('sale_update', function(data) {
            // Update the "Preparing.." list
            const preparingList = document.getElementById('preparing-list');
            preparingList.innerHTML = '';  // Clear existing items
            data.not_ready_sales.forEach(sale => {
                const card = document.createElement('div');
                card.className = 'display-card';
                card.innerHTML = `<h5>${sale.number}</h5>`;
                preparingList.appendChild(card);
            });

            // Update the "Please Collect.." list
            const readyList = document.getElementById('ready-list');
            readyList.innerHTML = '';  // Clear existing items
            data.ready_sales.forEach(sale => {
                const card = document.createElement('div');
                card.className = 'display-card';
                card.innerHTML = `<h5>${sale.number}</h5>`;
                readyList.appendChild(card);
            });
        });

        // Log connection status for debugging
        socket.on('connect', function() {
            console.log('Connected to server');
        });
        socket.on('disconnect', function() {
            console.log('Disconnected from server');
        });
    </script>
</body>
</html>
