<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Screen</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    

</head>
<body>
    <div class=customer-screen-container>
        <div class="preparing-column">
            <h4>Preparing..</h4>
            {% for item in not_ready_orders %}
                <div class="display-card">
                    <h5>{{ item[1] }}</h5>
                </div>
            {% endfor %}
        </div>
        <div class="please-collect-column">
            <h4>Please Collect..</h4>
            {% for item in ready_orders %}
                <div class="display-card">
                    <h5>{{ item[1] }}</h5>
                </div>
            {% endfor %}
        </div>
        <div class="image-column">
            <img class="display-image" src="static/images/placeholder.png">
        </div>
    </div>
</body>
</html>
