<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Screen</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='kitchenstyle.css') }}">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://kit.fontawesome.com/34724dd888.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="page-wrapper">
        <div class="container">
            {% for sale_id, details in sales.items() %}
                <div class="card">
                    {% if details.status is none %}
                        <div class="card-header">
                            <h1>Order #{{ details.sale_number }}</h1>
                        </div>
                    {% else %}
                        <div class="ready-card-header">
                            <h1>Order #{{ details.sale_number }}</h1>
                        </div>
                    {% endif %}

                    <div class="card-body">
                        {% for item in details['items'] %}
                            <div class="item-row{% if item['status'] is not none %} ready{% else %} unready{% endif %}"
                                data-sale-id="{{ sale_id }}"
                                data-saleitem-rowid="{{ item['saleitem_rowid'] }}"
                                data-ready="{{ 1 if item['status'] is not none else 0 }}">
                                <span class="check-icon"></span>
                                <h2>{{ item['name'] }}</h2>
                            </div>
                        {% endfor %}
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>

    <script>
    const socket = io();

    socket.on('sale_update', (data) => {

        const container = document.querySelector('.container');
        if (!container) return;
        const sales = data.kitchen_sales || [];
        let html = '';
        sales.forEach(sale => {
            html += `<div class="card">`;
            if (sale.status == null) {
                html += `<div class="card-header"><h1>Order #${sale.sale_number}</h1></div>`;
            } else {
                html += `<div class="ready-card-header"><h1>Order #${sale.sale_number}</h1></div>`;
            }
            html += `<div class="card-body">`;
            sale.items.forEach(item => {
                const cls = item.status == null ? 'unready' : 'ready';
                html += `<div class="item-row ${cls}" data-sale-id="${sale.sale_id}" data-saleitem-rowid="${item.saleitem_rowid}" data-ready="${item.status == null ? 0 : 1}"><span class="check-icon"></span><h2>${item.name}</h2></div>`;
            });
            html += `</div></div>`;
        });
        container.innerHTML = html;
    });

    document.addEventListener('click', event => {
        const row = event.target.closest('.item-row');
        if (!row) return;

        const saleId = row.dataset.saleId;
        const saleitemRowid = row.dataset.saleitemRowid;
        const isReady = row.classList.contains('ready');
        const nextStatus = isReady ? 0 : 1;

        fetch('/item_status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sale_id: saleId, saleitem_rowid: saleitemRowid, status: nextStatus })
        })
        .then(response => response.json())
        .then(data => {
            if (data.status !== 'ok') throw new Error('Update failed');

            row.classList.toggle('ready', nextStatus === 1);
            row.classList.toggle('unready', nextStatus === 0);
            row.dataset.ready = nextStatus;

            const card = row.closest('.card');
            if (card) {
                const header = card.querySelector('.card-header, .ready-card-header');
                if (header) {
                    header.classList.toggle('ready-card-header', data.order_ready);
                    header.classList.toggle('card-header', !data.order_ready);
                }
            }
        })
    });
    </script>
</body>
