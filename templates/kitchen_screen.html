<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Screen</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='kitchenstyle.css') }}">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://kit.fontawesome.com/34724dd888.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="page-wrapper">
        <div class="container">
            {% for sale_num, details in sales.items() %}
                <div class="card">
                    {% if details.status is none %}
                        <div class="card-header">
                            <h1>Order #{{ sale_num }}</h1>
                        </div>
                    {% else %}
                        <div class="ready-card-header">
                            <h1>Order #{{ sale_num }}</h1>
                        </div>
                    {% endif %}

                    <div class="card-body">
                        {% for item in details['items'] %}
                            <div class="item-row">
                                {% if item['status'] is none %}
                                    <i class="fa-regular fa-circle-check"></i>
                                {% else %}
                                    <i class="fa-solid fa-circle-check"></i>
                                {% endif %}
                                <h2>{{ item['name'] }}</h2>
                            </div>
                        {% endfor %}
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
